<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Car Shift</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="profile.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <section class="profile-section">
        <div class="profile-card">
            <div class="profile-sidebar">
                <div class="avatar-circle"><i class="fas fa-user"></i></div>
                <h2 id="welcome-msg">Loading...</h2>
            </div>

            <div class="profile-content">
                <div class="info-group">
                    <label>First Name</label>
                    <div class="info-display"><span id="display-first">---</span></div>
                </div>
                <div class="info-group">
                    <label>Last Name</label>
                    <div class="info-display"><span id="display-last">---</span></div>
                </div>
                <div class="info-group full-width">
                    <label>Email Address</label>
                    <div class="info-display"><span id="display-email">---</span></div>
                </div>

                <div class="profile-actions" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button onclick="window.location.href='index.html'" class="btn-outline" style="flex: 1;">Home</button>
                    <button onclick="window.location.href='add-car.html'" class="add-btn" style="flex: 1.5; background-color: #4f46e5;">+ Post Car</button>
                    <button id="logout-btn" onclick="logout()" class="add-btn" style="flex: 1; background-color: #ef4444;">Logout</button>
                </div>
            </div>
            
            <div class="history-section-wrapper" style="padding: 20px;">
                <h3 style="margin-bottom: 20px;"><i class="fas fa-history"></i> My Rental History</h3>
                <div id="history-list" class="history-container">
                    <p>Loading your history...</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        let globalUserPhone = "";

        //** 1. მომხმარებლის ინფორმაციის ჩატვირთვა
        async function loadUserProfile() {
            const token = localStorage.getItem('token');

            if (!token) {
                window.location.href = "login.html";
                return;
            }

            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(window.atob(base64));
                globalUserPhone = payload["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/mobilephone"];
            } catch (e) {
                console.error("Token decoding failed", e);
                window.location.href = "login.html";
                return;
            }

            if (!globalUserPhone) return;

            try {
                const response = await axios.get(`https://rentcar.stepprojects.ge/api/Users/${globalUserPhone}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const user = response.data;
                document.getElementById('display-first').innerText = user.firstName;
                document.getElementById('display-last').innerText = user.lastName;
                document.getElementById('display-email').innerText = user.email;
                document.getElementById('welcome-msg').innerText = "Hello, " + user.firstName;

                loadPurchaseHistory(globalUserPhone, token);

            } catch (error) {
                console.error("Profile API Error:", error);
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Could not load profile data.',
                    confirmButtonColor: '#4f46e5'
                });
            }
        }

        //** 2. ისტორია
        async function loadPurchaseHistory(phone, token) {
            const container = document.getElementById("history-list");
            try {
                const response = await fetch(`https://rentcar.stepprojects.ge/Purchase/${phone}`, {
                    method: "GET",
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': '*/*'
                    }
                });

                if (response.ok) {
                    const historyData = await response.json();
                    renderHistory(historyData);
                } else {
                    container.innerHTML = "<p class='no-history'>No rental history found.</p>";
                }
            } catch (error) {
                console.error("History Fetch Error:", error);
                container.innerHTML = "<p>Failed to load history.</p>";
            }
        }

        function renderHistory(items) {
            const container = document.getElementById("history-list");
            if (!container) return;

            container.innerHTML = "";

            if (!items || items.length === 0) {
                container.innerHTML = `
                <div class="no-history" style="text-align: center; color: #999; padding: 20px;">
                    <i class="fas fa-car-side" style="font-size: 2rem;"></i>
                    <p>No rental history found.</p>
                </div>`;
                return;
            }

            let html = "";
            items.forEach((item) => {
                const brand = item.carBrand || "Car";
                const model = item.carModel || "";
                const carId = item.carId || "N/A";
                const price = item.price || 150;

                html += `
                    <div class="history-card">
                        <div class="card-left">
                            <div class="car-icon"><i class="fas fa-car"></i></div>
                            <div class="car-details">
                                <h4>${brand} ${model}</h4>
                                <span>Order ID: #${carId}</span>
                            </div>
                        </div>
                        <div class="card-right">
                            <div class="price-tag">${price} GEL</div>
                            <div class="status-label">Confirmed</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        //** 4. Logout
        function logout() {
            Swal.fire({
                title: 'დარწმუნებული ხართ?',
                text: "თქვენ ექაუნთიდან გამოსვლა გსურთ?",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#4f46e5',
                cancelButtonColor: '#d33',
                confirmButtonText: 'დიახ, გამოვიდე!',
                cancelButtonText: 'გაუქმება'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                }
            });
        }

        window.onload = loadUserProfile;
    </script>
</body>

</html>
